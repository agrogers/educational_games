<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Binary Adding Quiz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .form-col {
      display: flex;
      flex-direction: column;
    }
    .form-col .form-label {
      flex-grow: 1;
      display: flex;
      align-items: flex-start;
    }
  </style>
</head>
<body>
  <div id="banner" class="d-flex align-items-center justify-content-center" style="position: relative; width: 100%; min-height:80px; max-height: 140px; overflow: hidden; background-image: url('binary.jpg'); background-size: cover; background-position: center;">
    <div id="headerText" class="text-center" style="position: relative; color: white; z-index: 1;">
      <h1 class="mb-3" style="color: white;">Binary Adding Quizzz</h1>
    </div>
    <div id="headerStats" style="position: absolute; top: 10px; right: 20px; text-align: right; color: white; font-size: 14px;">
      <div id="scoreStats" style="display: none;">
        <div style="background-color: rgba(0,0,0,0.5); padding: 8px; border-radius: 4px;">
          <div id="scoreDisplay" style="color: white; font-weight: bold;">Score: 0 / 0</div>
          <div id="timerDisplay" style="color: white; font-weight: bold; margin-top: 5px;">Timer: 00:00</div>
        </div>
      </div>
    </div>
  </div>
  <div id="main" class="container py-3">
    <!-- Controls -->
    <div id="controlsCard" class="card mb-4">
      <div class="card-body">
        <form id="controlsForm" class="row g-3">
          <div class="col-6 col-md-auto form-col">
            <label class="form-label">Format</label>
            <div class="d-flex align-items-center gap-2">
              <select id="formatSelect" class="form-select">
                <option value="binary">Binary (base 2)</option>
                <option value="hexadecimal">Hexadecimal (base 16)</option>
              </select>
              <span id="formatBadge" class="badge bg-info text-dark">B</span>
            </div>
          </div>
          <div class="col-6 col-md-auto form-col">
            <label class="form-label">Numbers to add</label>
            <select id="numCountSelect" class="form-select">
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>
          <div class="col-6 col-md-auto form-col">
            <label class="form-label">Level</label>
            <select id="levelSelect" class="form-select">
              <option value="easy">Easy (4 bits)</option>
              <option value="medium">Medium (8 bits)</option>
              <option value="hard">Hard (12 bits)</option>
            </select>
          </div>
          <div class="col-6 col-md-auto form-col">
            <label class="form-label">Number of questions</label>
            <select id="questionCountSelect" class="form-select">
              <option value="1">1</option>
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="15">15</option>
              <option value="20">20</option>
            </select>
          </div>
          <div class="col-auto form-col">
            <label class="" style="visibility: hidden;">.</label>
            <button id="startBtn" type="button" class="btn btn-success">Start</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Quiz -->
    <div id="quizCard" class="card mb-4" style="display: none;">
      <div id="quizCardBody" class="card-body">
        <div id="initialPrompt" class="mb-3 text-muted alert alert-info" style="display: none;">Press Start to generate 10 questions.</div>

        <div id="questionsContainer" class="list-group mb-3">
          <!-- questions rendered here -->
        </div>

        <div id="buttonGroup" class="d-flex gap-2" style="display: none !important;">
          <button id="checkAllBtn" class="btn btn-primary">Check All</button>
        </div>

        <div id="overallFeedback" class="mt-3"></div>
      </div>
    </div>
  </div>

  <div id="paramsDisplay" style="background-color: #f8f9fa; padding: 8px; text-align: center; font-size: 11px; color: #999; border-top: 1px solid #dee2e6;"></div>

  <!-- Load Bootstrap first, then shared toast utility, then app script -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../toast.js"></script>
  <script src="script.js"></script>
</body>
</html>
